<!DOCTYPE html>
<html>
  <head>
    <title>WebSocket Test Client</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 20px;
      }
      .container {
        max-width: 600px;
        margin: 0 auto;
      }
      input,
      textarea,
      button {
        width: 100%;
        padding: 8px;
        margin: 5px 0;
        font-size: 14px;
      }
      button {
        background-color: #4caf50;
        color: white;
        cursor: pointer;
      }
      button:hover {
        background-color: #45a049;
      }
      #messages {
        border: 1px solid #ccc;
        height: 300px;
        overflow-y: auto;
        padding: 10px;
        margin: 10px 0;
        background-color: #f9f9f9;
      }
      .message {
        padding: 5px 0;
        border-bottom: 1px solid #eee;
      }
      .status {
        padding: 10px;
        margin: 10px 0;
        border-radius: 4px;
      }
      .connected {
        background-color: #d4edda;
        color: #155724;
      }
      .disconnected {
        background-color: #f8d7da;
        color: #721c24;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>WebSocket Test Client</h1>

      <div>
        <label>Chat ID:</label>
        <input
          type="number"
          id="chatId"
          value="1"
          placeholder="Enter chat ID"
        />
      </div>

      <div>
        <label>User ID:</label>
        <input
          type="number"
          id="userId"
          value="1"
          placeholder="Enter user ID"
        />
      </div>

      <button onclick="connect()">Connect</button>
      <button onclick="disconnect()">Disconnect</button>

      <div id="status" class="status disconnected">Status: Disconnected</div>

      <h3>Messages</h3>
      <div id="messages"></div>

      <div>
        <label>Send Message:</label>
        <textarea
          id="messageInput"
          placeholder="Enter message"
          rows="3"
        ></textarea>
      </div>

      <button onclick="sendMessage()">Send Message</button>
    </div>

    <script>
      let ws = null;

      function connect() {
        const chatId = document.getElementById("chatId").value;
        const userId = document.getElementById("userId").value;

        if (!chatId || !userId) {
          alert("Please enter Chat ID and User ID");
          return;
        }

        const url = `ws://localhost:8081/ws/${chatId}?user_id=${userId}`;
        console.log("Connecting to:", url);

        try {
          ws = new WebSocket(url);

          ws.onopen = function (event) {
            console.log("Connected");
            updateStatus("Connected", true);
            addMessage("System", "Connected to WebSocket server");
          };

          ws.onmessage = function (event) {
            console.log("Message received:", event.data);
            const data = JSON.parse(event.data);
            addMessage(data.type || "message", data.content);
          };

          ws.onerror = function (event) {
            console.error("WebSocket error:", event);
            addMessage("Error", "WebSocket error occurred");
            updateStatus("Error", false);
          };

          ws.onclose = function (event) {
            console.log("Disconnected");
            updateStatus("Disconnected", false);
            addMessage("System", "Disconnected from WebSocket server");
          };
        } catch (error) {
          console.error("Error creating WebSocket:", error);
          addMessage("Error", "Failed to create WebSocket: " + error.message);
          updateStatus("Error", false);
        }
      }

      function disconnect() {
        if (ws) {
          ws.close();
        }
      }

      function sendMessage() {
        const input = document.getElementById("messageInput");
        const message = input.value;

        if (!message) {
          alert("Please enter a message");
          return;
        }

        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(message);
          addMessage("You", message);
          input.value = "";
        } else {
          addMessage("Error", "WebSocket is not connected");
        }
      }

      function addMessage(type, content) {
        const messagesDiv = document.getElementById("messages");
        const messageEl = document.createElement("div");
        messageEl.className = "message";
        messageEl.innerHTML = `<strong>${type}:</strong> ${content}`;
        messagesDiv.appendChild(messageEl);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
      }

      function updateStatus(text, connected) {
        const statusDiv = document.getElementById("status");
        statusDiv.textContent = "Status: " + text;
        statusDiv.className =
          "status " + (connected ? "connected" : "disconnected");
      }

      // Allow Enter key to send message
      document
        .getElementById("messageInput")
        .addEventListener("keypress", function (event) {
          if (event.key === "Enter" && event.ctrlKey) {
            sendMessage();
          }
        });
    </script>
  </body>
</html>
